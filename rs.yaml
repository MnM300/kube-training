apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replica-equity
  namespace: dev
spec:
  # modify replicas according to your case
  replicas: 5
  selector:
    matchLabels:
      release: alpha
  template:
    metadata:
      labels:
        release: alpha
    spec:
      containers:
      - name: xyz
        image: quay.io/shruti1988/webapp
