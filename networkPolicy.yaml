apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: 
  name: mypolicy
spec:
  podSelector:
    matchLabels:
      color: black
  policyTypes:
    - Ingress
    - Egress
  ingress: 
    - from:
      - podSelector:
          matchLabels:
            color: green
  egress:
    - to:
      - podSelector:
          matchLabels:
            color: blue
