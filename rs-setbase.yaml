apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rs-setbased
spec:
  replicas: 5
  selector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - app1
      - app2
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
      - name: xyz
        image: quay.io/shruti1988/webapp
